<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 Gomoku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            user-select: none;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .player-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 12px 20px;
            min-width: 100px;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .player-panel.active {
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
            transform: scale(1.05);
        }

        .player-stone {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3), inset 2px 2px 4px rgba(255,255,255,0.15);
        }

        .player-stone.black {
            background: radial-gradient(circle at 40% 40%, #555, #111);
        }

        .player-stone.white {
            background: radial-gradient(circle at 40% 40%, #fff, #ccc);
            border: 1px solid #bbb;
        }

        .player-info {
            text-align: center;
        }

        .player-name {
            font-size: 14px;
            color: #a0a0b0;
            letter-spacing: 1px;
        }

        .player-score {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
            font-family: 'Courier New', monospace;
        }

        .vs-text {
            font-size: 18px;
            color: #606080;
            font-weight: bold;
        }

        .board-container {
            position: relative;
            border: 3px solid #0f3460;
            border-radius: 8px;
            background: #d4a056;
            box-shadow:
                0 0 20px rgba(233, 69, 96, 0.2),
                0 0 60px rgba(15, 52, 96, 0.4);
            padding: 10px;
        }

        canvas {
            display: block;
            cursor: pointer;
            border-radius: 4px;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .game-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .game-overlay h2 {
            font-size: 36px;
            color: #e94560;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .game-overlay .sub-text {
            color: #a0a0b0;
            font-size: 14px;
            margin-bottom: 8px;
        }

        /* 模式选择 */
        .mode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .mode-btn {
            padding: 8px 18px;
            font-size: 13px;
            font-weight: bold;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #16213e;
            color: #a0a0b0;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .mode-btn:hover {
            border-color: #e94560;
            color: #fff;
        }

        .mode-btn.selected {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
            box-shadow: 0 0 12px rgba(233, 69, 96, 0.4);
        }

        .btn {
            padding: 12px 32px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: #e94560;
            color: #fff;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:hover {
            background: #ff6b81;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .controls-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-secondary {
            background: #16213e;
            color: #a0a0b0;
            border: 2px solid #0f3460;
            padding: 8px 20px;
            font-size: 13px;
        }

        .btn-secondary:hover {
            border-color: #e94560;
            color: #fff;
        }

        .controls-info {
            color: #606080;
            font-size: 13px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .key-hint {
            display: inline-block;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            padding: 2px 8px;
            font-family: 'Courier New', monospace;
            color: #e94560;
            min-width: 24px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .game-header {
                gap: 10px;
            }
            .player-panel {
                padding: 8px 12px;
                min-width: 70px;
            }
            .player-stone {
                width: 22px;
                height: 22px;
            }
            .player-score {
                font-size: 18px;
            }
            .player-name {
                font-size: 11px;
            }
            .vs-text {
                font-size: 14px;
            }
            .btn {
                padding: 10px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <div class="player-panel active" id="panelBlack">
                <div class="player-stone black"></div>
                <div class="player-info">
                    <div class="player-name">黑方</div>
                    <div class="player-score" id="scoreBlack">0</div>
                </div>
            </div>
            <span class="vs-text">VS</span>
            <div class="player-panel" id="panelWhite">
                <div class="player-stone white"></div>
                <div class="player-info">
                    <div class="player-name">白方</div>
                    <div class="player-score" id="scoreWhite">0</div>
                </div>
            </div>
        </div>

        <div class="board-container" id="boardContainer">
            <canvas id="boardCanvas"></canvas>
            <div class="game-overlay active" id="overlay">
                <h2 id="overlayTitle">⚫ 五子棋 ⚪</h2>
                <div class="sub-text" id="overlaySub">选择模式 开始对局</div>
                <div class="mode-selector" id="modeSelector">
                    <button class="mode-btn selected" data-mode="pvp">👥 双人对战</button>
                    <button class="mode-btn" data-mode="pve">🤖 人机对战</button>
                </div>
                <button class="btn btn-primary" id="btnStart">开始对局</button>
            </div>
        </div>

        <div class="controls-row">
            <button class="btn btn-secondary" id="btnUndo">↩ 悔棋</button>
            <button class="btn btn-secondary" id="btnReset">🔄 重新开始</button>
        </div>

        <div class="controls-info">
            <span>点击棋盘落子</span>
            <span><span class="key-hint">Ctrl+Z</span> 悔棋</span>
            <span><span class="key-hint">R</span> 重新开始</span>
        </div>
    </div>

    <script>
        (function () {
            // ───── DOM 元素 ─────
            const canvas = document.getElementById('boardCanvas');
            const ctx = canvas.getContext('2d');
            const overlay = document.getElementById('overlay');
            const overlayTitle = document.getElementById('overlayTitle');
            const overlaySub = document.getElementById('overlaySub');
            const btnStart = document.getElementById('btnStart');
            const btnUndo = document.getElementById('btnUndo');
            const btnReset = document.getElementById('btnReset');
            const panelBlack = document.getElementById('panelBlack');
            const panelWhite = document.getElementById('panelWhite');
            const scoreBlackEl = document.getElementById('scoreBlack');
            const scoreWhiteEl = document.getElementById('scoreWhite');
            const modeBtns = document.querySelectorAll('.mode-btn');
            const nameBlack = panelBlack.querySelector('.player-name');
            const nameWhite = panelWhite.querySelector('.player-name');

            // ───── 棋盘配置 ─────
            const BOARD_SIZE = 15;
            const CELL_SIZE = 32;
            const PADDING = 20;
            const STONE_RADIUS = CELL_SIZE * 0.43;

            const boardWidth = (BOARD_SIZE - 1) * CELL_SIZE + PADDING * 2;
            const boardHeight = (BOARD_SIZE - 1) * CELL_SIZE + PADDING * 2;

            canvas.width = boardWidth;
            canvas.height = boardHeight;

            // 响应式缩放
            function resizeCanvas() {
                const maxWidth = Math.min(window.innerWidth - 20, 500);
                if (maxWidth < boardWidth) {
                    const scale = maxWidth / boardWidth;
                    canvas.style.width = maxWidth + 'px';
                    canvas.style.height = (boardHeight * scale) + 'px';
                } else {
                    canvas.style.width = boardWidth + 'px';
                    canvas.style.height = boardHeight + 'px';
                }
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // ───── 游戏状态 ─────
            const EMPTY = 0;
            const BLACK = 1;
            const WHITE = 2;

            let board = [];
            let currentPlayer = BLACK;
            let scoreBlack = 0;
            let scoreWhite = 0;
            let gameOver = false;
            let winner = null;
            let winLine = [];
            let moveHistory = [];
            let hoverPos = null;
            let gameStarted = false;
            let lastMovePos = null;
            let gameMode = 'pvp';        // 'pvp' | 'pve'
            let aiThinking = false;

            // ───── 初始化 ─────
            function initBoard() {
                board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(EMPTY));
                currentPlayer = BLACK;
                gameOver = false;
                winner = null;
                winLine = [];
                moveHistory = [];
                hoverPos = null;
                lastMovePos = null;
                aiThinking = false;
            }

            function updatePanelLabels() {
                if (gameMode === 'pve') {
                    nameBlack.textContent = '你 (先手)';
                    nameWhite.textContent = 'AI';
                } else {
                    nameBlack.textContent = '黑方';
                    nameWhite.textContent = '白方';
                }
            }

            function startGame() {
                initBoard();
                gameStarted = true;
                updatePanelLabels();
                overlay.classList.remove('active');
                updateTurnIndicator();
                draw();
            }

            function endGame(winPlayer, line) {
                gameOver = true;
                winner = winPlayer;
                winLine = line;
                gameStarted = false;
                aiThinking = false;

                if (winPlayer === BLACK) {
                    scoreBlack++;
                    scoreBlackEl.textContent = scoreBlack;
                    overlayTitle.textContent = gameMode === 'pve' ? '🎉 你赢了!' : '⚫ 黑方胜!';
                } else if (winPlayer === WHITE) {
                    scoreWhite++;
                    scoreWhiteEl.textContent = scoreWhite;
                    overlayTitle.textContent = gameMode === 'pve' ? '🤖 AI 获胜' : '⚪ 白方胜!';
                } else {
                    overlayTitle.textContent = '🤝 平局';
                }

                overlaySub.textContent = '点击「开始对局」再来一局';
                overlay.classList.add('active');
                updateTurnIndicator();
                draw();
            }

            function updateTurnIndicator() {
                panelBlack.classList.remove('active');
                panelWhite.classList.remove('active');
                if (!gameOver && gameStarted) {
                    if (currentPlayer === BLACK) panelBlack.classList.add('active');
                    else panelWhite.classList.add('active');
                }
            }

            // ───── 棋盘坐标转换 ─────
            function pixelToBoard(px, py) {
                const x = Math.round((px - PADDING) / CELL_SIZE);
                const y = Math.round((py - PADDING) / CELL_SIZE);
                if (x < 0 || x >= BOARD_SIZE || y < 0 || y >= BOARD_SIZE) return null;
                // 检查点击位置是否在交叉点附近
                const cx = x * CELL_SIZE + PADDING;
                const cy = y * CELL_SIZE + PADDING;
                const dist = Math.sqrt((px - cx) ** 2 + (py - cy) ** 2);
                if (dist > STONE_RADIUS + 2) return null;
                return { x, y };
            }

            function boardToPixel(x, y) {
                return {
                    x: x * CELL_SIZE + PADDING,
                    y: y * CELL_SIZE + PADDING,
                };
            }

            // ───── 胜负判断 ─────
            const DIRECTIONS = [
                [1, 0],   // 水平
                [0, 1],   // 垂直
                [1, 1],   // 对角线
                [1, -1],  // 反对角线
            ];

            function checkWin(x, y) {
                const player = board[y][x];
                if (player === EMPTY) return null;

                for (const [dx, dy] of DIRECTIONS) {
                    const line = [{ x, y }];

                    // 正方向
                    for (let i = 1; i < 5; i++) {
                        const nx = x + dx * i;
                        const ny = y + dy * i;
                        if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE && board[ny][nx] === player) {
                            line.push({ x: nx, y: ny });
                        } else break;
                    }

                    // 反方向
                    for (let i = 1; i < 5; i++) {
                        const nx = x - dx * i;
                        const ny = y - dy * i;
                        if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE && board[ny][nx] === player) {
                            line.unshift({ x: nx, y: ny });
                        } else break;
                    }

                    if (line.length >= 5) return line;
                }
                return null;
            }

            function isBoardFull() {
                for (let y = 0; y < BOARD_SIZE; y++) {
                    for (let x = 0; x < BOARD_SIZE; x++) {
                        if (board[y][x] === EMPTY) return false;
                    }
                }
                return true;
            }

            // ───── 落子 ─────
            function placeStone(x, y) {
                if (gameOver || !gameStarted || aiThinking) return false;
                if (board[y][x] !== EMPTY) return false;

                board[y][x] = currentPlayer;
                moveHistory.push({ x, y, player: currentPlayer });
                lastMovePos = { x, y };

                const line = checkWin(x, y);
                if (line) {
                    endGame(currentPlayer, line);
                    return true;
                }

                if (isBoardFull()) {
                    endGame(null, []);
                    return true;
                }

                currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
                updateTurnIndicator();
                draw();

                // AI 回合
                if (gameMode === 'pve' && !gameOver && currentPlayer === WHITE) {
                    aiThinking = true;
                    draw();
                    setTimeout(() => aiMove(), 150);
                }

                return true;
            }

            function undoMove() {
                if (gameOver || !gameStarted || aiThinking) return;
                if (moveHistory.length === 0) return;

                if (gameMode === 'pve') {
                    // 撤回玩家和 AI 各一步
                    const toUndo = Math.min(2, moveHistory.length);
                    for (let i = 0; i < toUndo; i++) {
                        const move = moveHistory.pop();
                        board[move.y][move.x] = EMPTY;
                        currentPlayer = move.player;
                    }
                } else {
                    const toUndo = Math.min(2, moveHistory.length);
                    for (let i = 0; i < toUndo; i++) {
                        const move = moveHistory.pop();
                        board[move.y][move.x] = EMPTY;
                        currentPlayer = move.player;
                    }
                }
                lastMovePos = moveHistory.length > 0 ? { x: moveHistory[moveHistory.length - 1].x, y: moveHistory[moveHistory.length - 1].y } : null;
                winLine = [];
                updateTurnIndicator();
                draw();
            }

            // ───── AI 逻辑 ─────
            const SCORE = {
                FIVE:       1000000,  // 成五
                OPEN_FOUR:  50000,    // 活四
                CLOSED_FOUR: 5000,    // 冲四
                OPEN_THREE:  3000,    // 活三
                CLOSED_THREE: 500,    // 眠三
                OPEN_TWO:    200,     // 活二
                CLOSED_TWO:   20,     // 眠二
            };

            // 评估某个玩家在某个位置的分数（单方向）
            function evaluateDirection(x, y, dx, dy, player) {
                let count = 1;    // 包含当前位置
                let openEnds = 0;
                let blocked = 0;

                // 正方向
                for (let i = 1; i <= 5; i++) {
                    const nx = x + dx * i;
                    const ny = y + dy * i;
                    if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                        if (board[ny][nx] === player) count++;
                        else if (board[ny][nx] === EMPTY) { openEnds++; break; }
                        else { blocked++; break; }
                    } else { blocked++; break; }
                }

                // 反方向
                for (let i = 1; i <= 5; i++) {
                    const nx = x - dx * i;
                    const ny = y - dy * i;
                    if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                        if (board[ny][nx] === player) count++;
                        else if (board[ny][nx] === EMPTY) { openEnds++; break; }
                        else { blocked++; break; }
                    } else { blocked++; break; }
                }

                if (count >= 5) return SCORE.FIVE;
                if (count === 4) {
                    if (openEnds === 2) return SCORE.OPEN_FOUR;
                    if (openEnds === 1) return SCORE.CLOSED_FOUR;
                    return 0;
                }
                if (count === 3) {
                    if (openEnds === 2 && blocked === 0) return SCORE.OPEN_THREE;
                    if (openEnds >= 1) return SCORE.CLOSED_THREE;
                    return 0;
                }
                if (count === 2) {
                    if (openEnds === 2 && blocked === 0) return SCORE.OPEN_TWO;
                    if (openEnds >= 1) return SCORE.CLOSED_TWO;
                    return 0;
                }
                if (count === 1) {
                    if (openEnds === 2) return SCORE.CLOSED_TWO;
                }
                return 0;
            }

            // 评估某个位置对某个玩家的总分
            function evaluatePosition(x, y, player) {
                let total = 0;
                for (const [dx, dy] of DIRECTIONS) {
                    total += evaluateDirection(x, y, dx, dy, player);
                }
                return total;
            }

            // 检查某个玩家是否差一步就赢（有双活三或活四等必胜局面，优先防守）
            function getMaxThreat(player) {
                let maxThreat = 0;
                for (let y = 0; y < BOARD_SIZE; y++) {
                    for (let x = 0; x < BOARD_SIZE; x++) {
                        if (board[y][x] !== EMPTY) continue;
                        const s = evaluatePosition(x, y, player);
                        if (s > maxThreat) maxThreat = s;
                    }
                }
                return maxThreat;
            }

            function aiMove() {
                if (gameOver) { aiThinking = false; return; }

                let bestScore = -1;
                let bestMoves = [];

                // 如果棋盘为空，下天元
                if (moveHistory.length === 0) {
                    const cx = Math.floor(BOARD_SIZE / 2);
                    const cy = Math.floor(BOARD_SIZE / 2);
                    placeStone(cx, cy);
                    aiThinking = false;
                    return;
                }

                const aiPlayer = WHITE;
                const humanPlayer = BLACK;

                for (let y = 0; y < BOARD_SIZE; y++) {
                    for (let x = 0; x < BOARD_SIZE; x++) {
                        if (board[y][x] !== EMPTY) continue;

                        // 只考虑已有棋子附近的位置（2格以内），减少计算
                        if (!hasNeighbor(x, y, 2)) continue;

                        const attackScore = evaluatePosition(x, y, aiPlayer);
                        const defenseScore = evaluatePosition(x, y, humanPlayer);

                        // AI 倾向：防守权重略高
                        let totalScore = attackScore * 1.0 + defenseScore * 1.1;

                        // 若 AI 能成五，立即下
                        if (attackScore >= SCORE.FIVE) {
                            totalScore += 10000000;
                        }
                        // 若能阻止对手成五，优先
                        if (defenseScore >= SCORE.FIVE) {
                            totalScore += 10000000;
                        }

                        if (totalScore > bestScore) {
                            bestScore = totalScore;
                            bestMoves = [{ x, y }];
                        } else if (totalScore === bestScore) {
                            bestMoves.push({ x, y });
                        }
                    }
                }

                if (bestMoves.length > 0) {
                    // 从最佳位置中选离中心最近的
                    const cx = Math.floor(BOARD_SIZE / 2);
                    const cy = Math.floor(BOARD_SIZE / 2);
                    bestMoves.sort((a, b) => {
                        const da = Math.abs(a.x - cx) + Math.abs(a.y - cy);
                        const db = Math.abs(b.x - cx) + Math.abs(b.y - cy);
                        return da - db;
                    });
                    const move = bestMoves[0];
                    placeStone(move.x, move.y);
                }

                aiThinking = false;
                draw();
            }

            // 检查位置 (x,y) 周围 distance 格内是否有棋子
            function hasNeighbor(x, y, distance) {
                for (let dy = -distance; dy <= distance; dy++) {
                    for (let dx = -distance; dx <= distance; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx;
                        const ny = y + dy;
                        if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE && board[ny][nx] !== EMPTY) {
                            return true;
                        }
                    }
                }
                return false;
            }

            // ───── 绘制 ─────
            function draw() {
                ctx.clearRect(0, 0, boardWidth, boardHeight);

                // 棋盘背景木纹
                const woodGrad = ctx.createLinearGradient(0, 0, boardWidth, boardHeight);
                woodGrad.addColorStop(0, '#e8c97a');
                woodGrad.addColorStop(0.3, '#d4a056');
                woodGrad.addColorStop(0.6, '#c9903c');
                woodGrad.addColorStop(1, '#d4a056');
                ctx.fillStyle = woodGrad;
                ctx.fillRect(0, 0, boardWidth, boardHeight);

                // 网格线
                ctx.strokeStyle = '#5a3a1a';
                ctx.lineWidth = 1;
                for (let i = 0; i < BOARD_SIZE; i++) {
                    const pos = i * CELL_SIZE + PADDING;
                    // 横线
                    ctx.beginPath();
                    ctx.moveTo(PADDING, pos);
                    ctx.lineTo(PADDING + (BOARD_SIZE - 1) * CELL_SIZE, pos);
                    ctx.stroke();
                    // 竖线
                    ctx.beginPath();
                    ctx.moveTo(pos, PADDING);
                    ctx.lineTo(pos, PADDING + (BOARD_SIZE - 1) * CELL_SIZE);
                    ctx.stroke();
                }

                // 星位（天元和四角星）
                const starPoints = [
                    [3, 3], [7, 3], [11, 3],
                    [3, 7], [7, 7], [11, 7],
                    [3, 11], [7, 11], [11, 11],
                ];
                ctx.fillStyle = '#5a3a1a';
                for (const [sx, sy] of starPoints) {
                    const px = sx * CELL_SIZE + PADDING;
                    const py = sy * CELL_SIZE + PADDING;
                    ctx.beginPath();
                    ctx.arc(px, py, 3, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 坐标标注
                ctx.fillStyle = '#5a3a1a';
                ctx.font = '9px "Microsoft YaHei", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const letters = 'ABCDEFGHIJKLMNO';
                for (let i = 0; i < BOARD_SIZE; i++) {
                    ctx.fillText(letters[i], i * CELL_SIZE + PADDING, PADDING - 11);
                    ctx.fillText(i + 1, PADDING - 11, i * CELL_SIZE + PADDING);
                }

                // 胜利连线高亮
                if (winLine.length > 0) {
                    for (const { x, y } of winLine) {
                        const px = x * CELL_SIZE + PADDING;
                        const py = y * CELL_SIZE + PADDING;
                        ctx.fillStyle = 'rgba(233, 69, 96, 0.35)';
                        ctx.beginPath();
                        ctx.arc(px, py, STONE_RADIUS + 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // 棋子
                for (let y = 0; y < BOARD_SIZE; y++) {
                    for (let x = 0; x < BOARD_SIZE; x++) {
                        if (board[y][x] === EMPTY) continue;
                        const px = x * CELL_SIZE + PADDING;
                        const py = y * CELL_SIZE + PADDING;
                        drawStone(px, py, board[y][x]);

                        // 最后一手标记
                        if (lastMovePos && lastMovePos.x === x && lastMovePos.y === y && !gameOver) {
                            ctx.fillStyle = board[y][x] === BLACK ? '#ff6b81' : '#333';
                            ctx.beginPath();
                            ctx.arc(px, py, 3, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }

                // AI 思考提示
                if (aiThinking && !gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.fillRect(0, 0, boardWidth, boardHeight);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 22px "Microsoft YaHei", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('AI 思考中...', boardWidth / 2, boardHeight / 2);
                    ctx.textAlign = 'start';
                }

                // 悬停预览（AI 回合不显示）
                const showHover = !aiThinking || (gameMode === 'pvp');
                if (hoverPos && !gameOver && gameStarted && board[hoverPos.y][hoverPos.x] === EMPTY && showHover) {
                    // 人机模式只显示黑方预览
                    if (gameMode === 'pve' && currentPlayer !== BLACK) { /* skip */ }
                    else {
                        const px = hoverPos.x * CELL_SIZE + PADDING;
                        const py = hoverPos.y * CELL_SIZE + PADDING;
                        ctx.globalAlpha = 0.4;
                        drawStone(px, py, currentPlayer);
                        ctx.globalAlpha = 1;
                    }
                }
            }

            function drawStone(px, py, player) {
                // 阴影
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.beginPath();
                ctx.arc(px + 2, py + 2, STONE_RADIUS, 0, Math.PI * 2);
                ctx.fill();

                // 棋子本体
                const grad = ctx.createRadialGradient(
                    px - STONE_RADIUS * 0.3, py - STONE_RADIUS * 0.3, STONE_RADIUS * 0.1,
                    px, py, STONE_RADIUS
                );

                if (player === BLACK) {
                    grad.addColorStop(0, '#666');
                    grad.addColorStop(0.7, '#222');
                    grad.addColorStop(1, '#000');
                } else {
                    grad.addColorStop(0, '#fff');
                    grad.addColorStop(0.7, '#e8e8e8');
                    grad.addColorStop(1, '#c0c0c0');
                }

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(px, py, STONE_RADIUS, 0, Math.PI * 2);
                ctx.fill();

                // 光泽
                ctx.fillStyle = player === BLACK ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(px - STONE_RADIUS * 0.25, py - STONE_RADIUS * 0.25, STONE_RADIUS * 0.35, 0, Math.PI * 2);
                ctx.fill();
            }

            // ───── 事件处理 ─────
            canvas.addEventListener('click', (e) => {
                if (aiThinking) return;

                const rect = canvas.getBoundingClientRect();
                const scaleX = boardWidth / rect.width;
                const scaleY = boardHeight / rect.height;
                const px = (e.clientX - rect.left) * scaleX;
                const py = (e.clientY - rect.top) * scaleY;
                const pos = pixelToBoard(px, py);

                if (!pos) return;

                // 人机模式：只有黑方（玩家）回合才能落子
                if (gameMode === 'pve' && gameStarted && !gameOver && currentPlayer !== BLACK) return;

                if (!gameStarted && !gameOver) {
                    startGame();
                    placeStone(pos.x, pos.y);
                    return;
                }

                placeStone(pos.x, pos.y);
            });

            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = boardWidth / rect.width;
                const scaleY = boardHeight / rect.height;
                const px = (e.clientX - rect.left) * scaleX;
                const py = (e.clientY - rect.top) * scaleY;
                const pos = pixelToBoard(px, py);

                if (!pos || (pos.x === hoverPos?.x && pos.y === hoverPos?.y)) {
                    if (!pos) hoverPos = null;
                    return;
                }
                hoverPos = pos;
                if (!gameOver && gameStarted) draw();
            });

            canvas.addEventListener('mouseleave', () => {
                hoverPos = null;
                if (!gameOver) draw();
            });

            btnStart.addEventListener('click', startGame);
            btnUndo.addEventListener('click', undoMove);
            btnReset.addEventListener('click', startGame);

            // ───── 模式选择 ─────
            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (gameStarted && !gameOver) return;
                    modeBtns.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    gameMode = btn.dataset.mode;
                    initBoard();
                    updatePanelLabels();
                    draw();
                });
            });

            // 初始标签
            updatePanelLabels();

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'z') {
                    e.preventDefault();
                    undoMove();
                }
                if (e.key === 'r' || e.key === 'R') {
                    if (!e.ctrlKey) {
                        startGame();
                    }
                }
            });

            // ───── 初始渲染 ─────
            initBoard();
            draw();
        })();
    </script>
</body>
</html>
