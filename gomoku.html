<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 Gomoku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            user-select: none;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .player-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 12px 20px;
            min-width: 100px;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .player-panel.active {
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
            transform: scale(1.05);
        }

        .player-stone {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3), inset 2px 2px 4px rgba(255,255,255,0.15);
        }

        .player-stone.black {
            background: radial-gradient(circle at 40% 40%, #555, #111);
        }

        .player-stone.white {
            background: radial-gradient(circle at 40% 40%, #fff, #ccc);
            border: 1px solid #bbb;
        }

        .player-info {
            text-align: center;
        }

        .player-name {
            font-size: 14px;
            color: #a0a0b0;
            letter-spacing: 1px;
        }

        .player-score {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
            font-family: 'Courier New', monospace;
        }

        .vs-text {
            font-size: 18px;
            color: #606080;
            font-weight: bold;
        }

        .board-container {
            position: relative;
            border: 3px solid #0f3460;
            border-radius: 8px;
            background: #d4a056;
            box-shadow:
                0 0 20px rgba(233, 69, 96, 0.2),
                0 0 60px rgba(15, 52, 96, 0.4);
            padding: 10px;
        }

        canvas {
            display: block;
            cursor: pointer;
            border-radius: 4px;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .game-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .game-overlay h2 {
            font-size: 36px;
            color: #e94560;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .game-overlay .sub-text {
            color: #a0a0b0;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 32px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: #e94560;
            color: #fff;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:hover {
            background: #ff6b81;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .controls-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-secondary {
            background: #16213e;
            color: #a0a0b0;
            border: 2px solid #0f3460;
            padding: 8px 20px;
            font-size: 13px;
        }

        .btn-secondary:hover {
            border-color: #e94560;
            color: #fff;
        }

        .controls-info {
            color: #606080;
            font-size: 13px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .key-hint {
            display: inline-block;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            padding: 2px 8px;
            font-family: 'Courier New', monospace;
            color: #e94560;
            min-width: 24px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .game-header {
                gap: 10px;
            }
            .player-panel {
                padding: 8px 12px;
                min-width: 70px;
            }
            .player-stone {
                width: 22px;
                height: 22px;
            }
            .player-score {
                font-size: 18px;
            }
            .player-name {
                font-size: 11px;
            }
            .vs-text {
                font-size: 14px;
            }
            .btn {
                padding: 10px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <div class="player-panel active" id="panelBlack">
                <div class="player-stone black"></div>
                <div class="player-info">
                    <div class="player-name">黑方</div>
                    <div class="player-score" id="scoreBlack">0</div>
                </div>
            </div>
            <span class="vs-text">VS</span>
            <div class="player-panel" id="panelWhite">
                <div class="player-stone white"></div>
                <div class="player-info">
                    <div class="player-name">白方</div>
                    <div class="player-score" id="scoreWhite">0</div>
                </div>
            </div>
        </div>

        <div class="board-container" id="boardContainer">
            <canvas id="boardCanvas"></canvas>
            <div class="game-overlay active" id="overlay">
                <h2 id="overlayTitle">⚫ 五子棋 ⚪</h2>
                <div class="sub-text" id="overlaySub">点击棋盘落子 或 点下方按钮开始</div>
                <button class="btn btn-primary" id="btnStart">开始对局</button>
            </div>
        </div>

        <div class="controls-row">
            <button class="btn btn-secondary" id="btnUndo">↩ 悔棋</button>
            <button class="btn btn-secondary" id="btnReset">🔄 重新开始</button>
        </div>

        <div class="controls-info">
            <span>点击棋盘落子</span>
            <span><span class="key-hint">Ctrl+Z</span> 悔棋</span>
            <span><span class="key-hint">R</span> 重新开始</span>
        </div>
    </div>

    <script>
        (function () {
            // ───── DOM 元素 ─────
            const canvas = document.getElementById('boardCanvas');
            const ctx = canvas.getContext('2d');
            const overlay = document.getElementById('overlay');
            const overlayTitle = document.getElementById('overlayTitle');
            const overlaySub = document.getElementById('overlaySub');
            const btnStart = document.getElementById('btnStart');
            const btnUndo = document.getElementById('btnUndo');
            const btnReset = document.getElementById('btnReset');
            const panelBlack = document.getElementById('panelBlack');
            const panelWhite = document.getElementById('panelWhite');
            const scoreBlackEl = document.getElementById('scoreBlack');
            const scoreWhiteEl = document.getElementById('scoreWhite');

            // ───── 棋盘配置 ─────
            const BOARD_SIZE = 15;
            const CELL_SIZE = 32;
            const PADDING = 20;
            const STONE_RADIUS = CELL_SIZE * 0.43;

            const boardWidth = (BOARD_SIZE - 1) * CELL_SIZE + PADDING * 2;
            const boardHeight = (BOARD_SIZE - 1) * CELL_SIZE + PADDING * 2;

            canvas.width = boardWidth;
            canvas.height = boardHeight;

            // 响应式缩放
            function resizeCanvas() {
                const maxWidth = Math.min(window.innerWidth - 20, 500);
                if (maxWidth < boardWidth) {
                    const scale = maxWidth / boardWidth;
                    canvas.style.width = maxWidth + 'px';
                    canvas.style.height = (boardHeight * scale) + 'px';
                } else {
                    canvas.style.width = boardWidth + 'px';
                    canvas.style.height = boardHeight + 'px';
                }
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // ───── 游戏状态 ─────
            const EMPTY = 0;
            const BLACK = 1;
            const WHITE = 2;

            let board = [];
            let currentPlayer = BLACK;
            let scoreBlack = 0;
            let scoreWhite = 0;
            let gameOver = false;
            let winner = null;
            let winLine = [];
            let moveHistory = [];
            let hoverPos = null;
            let gameStarted = false;
            let lastMovePos = null;

            // ───── 初始化 ─────
            function initBoard() {
                board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(EMPTY));
                currentPlayer = BLACK;
                gameOver = false;
                winner = null;
                winLine = [];
                moveHistory = [];
                hoverPos = null;
                lastMovePos = null;
            }

            function startGame() {
                initBoard();
                gameStarted = true;
                overlay.classList.remove('active');
                updateTurnIndicator();
                draw();
            }

            function endGame(winPlayer, line) {
                gameOver = true;
                winner = winPlayer;
                winLine = line;
                gameStarted = false;

                if (winPlayer === BLACK) {
                    scoreBlack++;
                    scoreBlackEl.textContent = scoreBlack;
                    overlayTitle.textContent = '⚫ 黑方胜!';
                } else if (winPlayer === WHITE) {
                    scoreWhite++;
                    scoreWhiteEl.textContent = scoreWhite;
                    overlayTitle.textContent = '⚪ 白方胜!';
                } else {
                    overlayTitle.textContent = '🤝 平局';
                }

                overlaySub.textContent = '点击「开始对局」再来一局';
                overlay.classList.add('active');
                updateTurnIndicator();
                draw();
            }

            function updateTurnIndicator() {
                panelBlack.classList.remove('active');
                panelWhite.classList.remove('active');
                if (!gameOver && gameStarted) {
                    if (currentPlayer === BLACK) panelBlack.classList.add('active');
                    else panelWhite.classList.add('active');
                }
            }

            // ───── 棋盘坐标转换 ─────
            function pixelToBoard(px, py) {
                const x = Math.round((px - PADDING) / CELL_SIZE);
                const y = Math.round((py - PADDING) / CELL_SIZE);
                if (x < 0 || x >= BOARD_SIZE || y < 0 || y >= BOARD_SIZE) return null;
                // 检查点击位置是否在交叉点附近
                const cx = x * CELL_SIZE + PADDING;
                const cy = y * CELL_SIZE + PADDING;
                const dist = Math.sqrt((px - cx) ** 2 + (py - cy) ** 2);
                if (dist > STONE_RADIUS + 2) return null;
                return { x, y };
            }

            function boardToPixel(x, y) {
                return {
                    x: x * CELL_SIZE + PADDING,
                    y: y * CELL_SIZE + PADDING,
                };
            }

            // ───── 胜负判断 ─────
            const DIRECTIONS = [
                [1, 0],   // 水平
                [0, 1],   // 垂直
                [1, 1],   // 对角线
                [1, -1],  // 反对角线
            ];

            function checkWin(x, y) {
                const player = board[y][x];
                if (player === EMPTY) return null;

                for (const [dx, dy] of DIRECTIONS) {
                    const line = [{ x, y }];

                    // 正方向
                    for (let i = 1; i < 5; i++) {
                        const nx = x + dx * i;
                        const ny = y + dy * i;
                        if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE && board[ny][nx] === player) {
                            line.push({ x: nx, y: ny });
                        } else break;
                    }

                    // 反方向
                    for (let i = 1; i < 5; i++) {
                        const nx = x - dx * i;
                        const ny = y - dy * i;
                        if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE && board[ny][nx] === player) {
                            line.unshift({ x: nx, y: ny });
                        } else break;
                    }

                    if (line.length >= 5) return line;
                }
                return null;
            }

            function isBoardFull() {
                for (let y = 0; y < BOARD_SIZE; y++) {
                    for (let x = 0; x < BOARD_SIZE; x++) {
                        if (board[y][x] === EMPTY) return false;
                    }
                }
                return true;
            }

            // ───── 落子 ─────
            function placeStone(x, y) {
                if (gameOver || !gameStarted) return false;
                if (board[y][x] !== EMPTY) return false;

                board[y][x] = currentPlayer;
                moveHistory.push({ x, y, player: currentPlayer });
                lastMovePos = { x, y };

                const line = checkWin(x, y);
                if (line) {
                    endGame(currentPlayer, line);
                    return true;
                }

                if (isBoardFull()) {
                    endGame(null, []);
                    return true;
                }

                currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
                updateTurnIndicator();
                draw();
                return true;
            }

            function undoMove() {
                if (gameOver || !gameStarted) return;
                if (moveHistory.length === 0) return;
                // 撤回两步（让当前玩家撤回对方和自己的棋）
                const toUndo = Math.min(2, moveHistory.length);
                for (let i = 0; i < toUndo; i++) {
                    const move = moveHistory.pop();
                    board[move.y][move.x] = EMPTY;
                    currentPlayer = move.player;
                }
                lastMovePos = moveHistory.length > 0 ? { x: moveHistory[moveHistory.length - 1].x, y: moveHistory[moveHistory.length - 1].y } : null;
                winLine = [];
                updateTurnIndicator();
                draw();
            }

            // ───── 绘制 ─────
            function draw() {
                ctx.clearRect(0, 0, boardWidth, boardHeight);

                // 棋盘背景木纹
                const woodGrad = ctx.createLinearGradient(0, 0, boardWidth, boardHeight);
                woodGrad.addColorStop(0, '#e8c97a');
                woodGrad.addColorStop(0.3, '#d4a056');
                woodGrad.addColorStop(0.6, '#c9903c');
                woodGrad.addColorStop(1, '#d4a056');
                ctx.fillStyle = woodGrad;
                ctx.fillRect(0, 0, boardWidth, boardHeight);

                // 网格线
                ctx.strokeStyle = '#5a3a1a';
                ctx.lineWidth = 1;
                for (let i = 0; i < BOARD_SIZE; i++) {
                    const pos = i * CELL_SIZE + PADDING;
                    // 横线
                    ctx.beginPath();
                    ctx.moveTo(PADDING, pos);
                    ctx.lineTo(PADDING + (BOARD_SIZE - 1) * CELL_SIZE, pos);
                    ctx.stroke();
                    // 竖线
                    ctx.beginPath();
                    ctx.moveTo(pos, PADDING);
                    ctx.lineTo(pos, PADDING + (BOARD_SIZE - 1) * CELL_SIZE);
                    ctx.stroke();
                }

                // 星位（天元和四角星）
                const starPoints = [
                    [3, 3], [7, 3], [11, 3],
                    [3, 7], [7, 7], [11, 7],
                    [3, 11], [7, 11], [11, 11],
                ];
                ctx.fillStyle = '#5a3a1a';
                for (const [sx, sy] of starPoints) {
                    const px = sx * CELL_SIZE + PADDING;
                    const py = sy * CELL_SIZE + PADDING;
                    ctx.beginPath();
                    ctx.arc(px, py, 3, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 坐标标注
                ctx.fillStyle = '#5a3a1a';
                ctx.font = '9px "Microsoft YaHei", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const letters = 'ABCDEFGHIJKLMNO';
                for (let i = 0; i < BOARD_SIZE; i++) {
                    ctx.fillText(letters[i], i * CELL_SIZE + PADDING, PADDING - 11);
                    ctx.fillText(i + 1, PADDING - 11, i * CELL_SIZE + PADDING);
                }

                // 胜利连线高亮
                if (winLine.length > 0) {
                    for (const { x, y } of winLine) {
                        const px = x * CELL_SIZE + PADDING;
                        const py = y * CELL_SIZE + PADDING;
                        ctx.fillStyle = 'rgba(233, 69, 96, 0.35)';
                        ctx.beginPath();
                        ctx.arc(px, py, STONE_RADIUS + 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // 棋子
                for (let y = 0; y < BOARD_SIZE; y++) {
                    for (let x = 0; x < BOARD_SIZE; x++) {
                        if (board[y][x] === EMPTY) continue;
                        const px = x * CELL_SIZE + PADDING;
                        const py = y * CELL_SIZE + PADDING;
                        drawStone(px, py, board[y][x]);

                        // 最后一手标记
                        if (lastMovePos && lastMovePos.x === x && lastMovePos.y === y && !gameOver) {
                            ctx.fillStyle = board[y][x] === BLACK ? '#ff6b81' : '#333';
                            ctx.beginPath();
                            ctx.arc(px, py, 3, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }

                // 悬停预览
                if (hoverPos && !gameOver && gameStarted && board[hoverPos.y][hoverPos.x] === EMPTY) {
                    const px = hoverPos.x * CELL_SIZE + PADDING;
                    const py = hoverPos.y * CELL_SIZE + PADDING;
                    ctx.globalAlpha = 0.4;
                    drawStone(px, py, currentPlayer);
                    ctx.globalAlpha = 1;
                }
            }

            function drawStone(px, py, player) {
                // 阴影
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.beginPath();
                ctx.arc(px + 2, py + 2, STONE_RADIUS, 0, Math.PI * 2);
                ctx.fill();

                // 棋子本体
                const grad = ctx.createRadialGradient(
                    px - STONE_RADIUS * 0.3, py - STONE_RADIUS * 0.3, STONE_RADIUS * 0.1,
                    px, py, STONE_RADIUS
                );

                if (player === BLACK) {
                    grad.addColorStop(0, '#666');
                    grad.addColorStop(0.7, '#222');
                    grad.addColorStop(1, '#000');
                } else {
                    grad.addColorStop(0, '#fff');
                    grad.addColorStop(0.7, '#e8e8e8');
                    grad.addColorStop(1, '#c0c0c0');
                }

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(px, py, STONE_RADIUS, 0, Math.PI * 2);
                ctx.fill();

                // 光泽
                ctx.fillStyle = player === BLACK ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(px - STONE_RADIUS * 0.25, py - STONE_RADIUS * 0.25, STONE_RADIUS * 0.35, 0, Math.PI * 2);
                ctx.fill();
            }

            // ───── 事件处理 ─────
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = boardWidth / rect.width;
                const scaleY = boardHeight / rect.height;
                const px = (e.clientX - rect.left) * scaleX;
                const py = (e.clientY - rect.top) * scaleY;
                const pos = pixelToBoard(px, py);

                if (!pos) return;

                if (!gameStarted && !gameOver) {
                    // 点击棋盘开始
                    startGame();
                    placeStone(pos.x, pos.y);
                    return;
                }

                placeStone(pos.x, pos.y);
            });

            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = boardWidth / rect.width;
                const scaleY = boardHeight / rect.height;
                const px = (e.clientX - rect.left) * scaleX;
                const py = (e.clientY - rect.top) * scaleY;
                const pos = pixelToBoard(px, py);

                if (!pos || (pos.x === hoverPos?.x && pos.y === hoverPos?.y)) {
                    if (!pos) hoverPos = null;
                    return;
                }
                hoverPos = pos;
                if (!gameOver && gameStarted) draw();
            });

            canvas.addEventListener('mouseleave', () => {
                hoverPos = null;
                if (!gameOver) draw();
            });

            btnStart.addEventListener('click', startGame);
            btnUndo.addEventListener('click', undoMove);
            btnReset.addEventListener('click', startGame);

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'z') {
                    e.preventDefault();
                    undoMove();
                }
                if (e.key === 'r' || e.key === 'R') {
                    if (!e.ctrlKey) {
                        startGame();
                    }
                }
            });

            // ───── 初始渲染 ─────
            initBoard();
            draw();
        })();
    </script>
</body>
</html>
